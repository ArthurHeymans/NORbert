name: Deploy WebUI to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: tool -> tool/target
      - name: Install Trunk
        run: cargo install trunk --locked
      - name: Build WebUI with Trunk
        working-directory: tool
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Allow bubblewrap user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
      - name: Build FPGA bitstream
        run: nix develop --command make build
      - name: Add bitstream to Pages bundle
        run: cp impl/pnr/spi_flash.fs tool/dist/spi_flash.fs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: tool/dist

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
