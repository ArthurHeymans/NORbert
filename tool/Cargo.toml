[package]
name = "spi-flash-tool"
version = "0.2.0"
edition = "2021"
description = "Tool for loading data into the Tang Primer 25K SPI Flash Emulator (UART + FT245)"

[features]
default = ["cli", "ftdi"]
cli = ["clap", "ctrlc", "indicatif", "serialport"]
d2xx = ["cli", "libftd2xx"]
ftdi = ["cli", "dep:ftdi_usb", "ftdi_usb/std"]
web = [
  "dep:ftdi_usb",
  "ftdi_usb/wasm",
  "console_error_panic_hook",
  "console_log",
  "eframe",
  "egui",
  "js-sys",
  "log",
  "wasm-bindgen",
  "wasm-bindgen-futures",
  "web-sys",
]

[dependencies]
serialport = { version = "4.3", optional = true }
libftd2xx = { version = "0.32", optional = true }
ftdi_usb = { package = "ftdi-nusb", git = "https://github.com/ArthurHeymans/ftdi-nusb.git", branch = "feat/wasm-webusb", optional = true, default-features = false }
clap = { version = "4.4", features = ["derive"], optional = true }
anyhow = "1.0"
indicatif = { version = "0.17", optional = true }
serde = { version = "1.0", features = ["derive"] }
ron = "0.8"
rflasher-core = { git = "https://github.com/ArthurHeymans/rflasher.git", package = "rflasher-core", default-features = false, features = [
  "std",
  "static-chips",
] }
ctrlc = { version = "3.4", optional = true }

# Web UI dependencies
eframe = { version = "0.29", optional = true, default-features = false, features = [
  "default_fonts",
  "glow",
] }
egui = { version = "0.29", optional = true }
wasm-bindgen = { version = "=0.2.100", optional = true }
wasm-bindgen-futures = { version = "=0.4.50", optional = true }
js-sys = { version = "=0.3.77", optional = true }
log = { version = "0.4", optional = true }
console_log = { version = "1", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
web-sys = { version = "=0.3.77", optional = true, features = [
  "Blob",
  "BlobPropertyBag",
  "Document",
  "Element",
  "Event",
  "File",
  "FileList",
  "FlowControlType",
  "HtmlAnchorElement",
  "HtmlCanvasElement",
  "HtmlElement",
  "HtmlInputElement",
  "Navigator",
  "ReadableStream",
  "Response",
  "ReadableStreamByobReader",
  "ReadableStreamDefaultReader",
  "ReadableStreamGetReaderOptions",
  "ReadableStreamReadResult",
  "ReadableStreamReaderMode",
  "Serial",
  "SerialOptions",
  "SerialPort",
  "Url",
  "Window",
  "WritableStream",
  "WritableStreamDefaultWriter",
  "console",
] }

[lib]
path = "src/lib.rs"

[[bin]]
name = "spi-flash-tool"
path = "src/main.rs"
required-features = ["cli"]

[[bin]]
name = "norbert-web"
path = "src/web_main.rs"
required-features = ["web"]
